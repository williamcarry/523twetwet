# Redis配置文件 - 生产环境
# 最大内存限制 (根据服务器内存调整)
maxmemory 2Gb
# 内存淘汰策略
# allkeys-lru: 在所有键中使用LRU算法淘汰
maxmemory-policy allkeys-lru

# TCP keepalive
tcp-keepalive 300

# 日志级别
loglevel notice

# 数据库数量
databases 16

# RDB持久化配置
save 900 1
save 300 10
save 60 10000

# 密码认证
requirepass xK9mP2vL8nQ5wR7tY3bN6cM4

# 绑定IP (0.0.0.0允许所有网络接口访问，Docker容器需要)
bind 0.0.0.0

# 端口
port 6379
